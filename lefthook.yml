pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,md}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typescript:
      run: pnpm run typecheck

commit-msg:
  commands:
    commit_check:
      run: pnpm exec commitlint --edit {1}

