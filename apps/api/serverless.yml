# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: vitorrsousaa
# "service" is the name of this project. This will also be added to your AWS resource names.
service: LifeOS
useDotenv: true

package:
  individually: true

plugins:
  - serverless-dotenv-plugin
  - serverless-offline

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  deploymentMethod: direct
  architecture: arm64
  memorySize: 128
  environment:
    STAGE: ${self:provider.stage}

custom:
  dotenv:
    exclude:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
  serverless-offline:
    httpPort: 4000
    lambdaPort: 3002
    noPrependStageInUrl: true

build:
  esbuild:
    bundle: true
    minify: true
    sourcemap: false
    exclude:
      - "@aws-sdk/*"
    target: node20

functions:
  getTodos:
    handler: src/server/functions/todo/get-todos/index.handler
    events:
      - httpApi:
          path: /todos
          method: get
  getInboxTodos:
    handler: src/server/functions/todo/get-inbox-todos/index.handler
    events:
      - httpApi:
          path: /todos/inbox
          method: get
  getTodayTasks:
    handler: src/server/functions/tasks/get-today-tasks/index.handler
    events:
      - httpApi:
          path: /tasks/today
          method: get
  getDashboardAnalytics:
    handler: src/server/functions/tasks/get-dashboard-analytics/index.handler
    events:
      - httpApi:
          path: /tasks/dashboard
          method: get
  getAllProjectsByUser:
    handler: src/server/functions/projects/get-all-projects-by-user/index.handler
    events:
      - httpApi:
          path: /projects
          method: get
  createProject:
    handler: src/server/functions/projects/create-project/index.handler
    events:
      - httpApi:
          path: /projects
          method: post
  getProjectDetail:
    handler: src/server/functions/projects/get-project-detail/index.handler
    events:
      - httpApi:
          path: /projects/{projectId}/detail
          method: get
  createSection:
    handler: src/server/functions/sections/create-section/index.handler
    events:
      - httpApi:
          path: /projects/{projectId}/sections
          method: post
  getAllByProject:
    handler: src/server/functions/sections/get-all-by-project/index.handler
    events:
      - httpApi:
          path: /projects/{projectId}/sections
          method: get

  createTodo:
    handler: src/server/functions/todo/create-todo/index.handler
    events:
      - httpApi:
          path: /todos
          method: post
