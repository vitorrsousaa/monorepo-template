# Standalone: same image/mounts/env as devcontainer.json (CLI workflow).
# From repo root: docker compose -f .devcontainer/docker-compose.yml up -d
# Enter:        docker compose -f .devcontainer/docker-compose.yml exec claude-sandbox zsh
# Stop:         docker compose -f .devcontainer/docker-compose.yml down

services:
  claude-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-America/Los_Angeles}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        GIT_DELTA_VERSION: ${GIT_DELTA_VERSION:-0.18.2}
        ZSH_IN_DOCKER_VERSION: ${ZSH_IN_DOCKER_VERSION:-1.2.0}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    user: node
    working_dir: /workspace
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
      CLAUDE_CONFIG_DIR: /home/node/.claude
      POWERLEVEL9K_DISABLE_GITSTATUS: "true"
    volumes:
      # Compose file lives in .devcontainer/ — parent folder is the repo root
      - ..:/workspace
      - claude-code-bashhistory:/commandhistory
      - claude-code-config:/home/node/.claude
    # Mirrors postStartCommand; keep container running for docker exec / tmux
    command: ["sh", "-c", "sudo /usr/local/bin/init-firewall.sh && exec sleep infinity"]

volumes:
  claude-code-bashhistory:
  claude-code-config:
