name: Security (Semgrep)

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep (OSS rules)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Rule packs from the public registry: TypeScript, Node.js, JWT-focused rules.
      # Remove --error if you want findings to be reported without failing the job.
      - name: Run Semgrep
        run: pnpm run ci:semgrep
